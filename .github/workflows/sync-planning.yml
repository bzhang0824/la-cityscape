name: Sync Planning Cases

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = 10pm PDT
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt httpx asyncpg

      - name: Sync planning cases
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m backend.pipelines.planning.sync_planning
