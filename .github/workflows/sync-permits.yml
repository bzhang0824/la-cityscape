name: Sync LADBS Permits

on:
  schedule:
    - cron: '0 4 * * *'  # 4am UTC = 9pm PDT
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt httpx asyncpg

      - name: Sync permits from LADBS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python -m backend.pipelines.permits.sync_permits
